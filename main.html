    <script>
        function imgError(element) {
            $(element).siblings('i').css('display', 'block');
            $(element).css('display', 'none');
        }
    </script>

    <div class="container" tabindex="0">
        <div class="img">
            <div class="form-box">

                <div id="form" class="form">
                    <h1 id="title">Register</h1>
                    
                    <div class="radios-div">
                        <div class="greg-div">
                            <input type="radio" name="radios" value="greg" id="greg-rad" checked>
                            <label for="greg-rad" id="radio-lab1">ميلادي</label>
                        </div>
                        <div class="hijr-div">
                            <input type="radio" name="radios" value="hijr" id="hijr-rad">
                            <label for="hijr-rad" id="radio-lab2">هجري</label>
                        </div>
                    </div>

                    <div class="input-box" id="input-div1">
                        <label for="" id="date-lab1">التاريخ الأول (بالميلادي)</label>
                        <div id="date-inputs1" class="date-inputs">
                            <select id="days1" name="" class="days" value="days" title="قم بتحديد اليوم في التاريخ الأول">
                                <option value="default" selected disabled hidden>اليوم</option>
                            </select>
                            <select id="months1" name="" class="months" value="months" title="قم بتحديد الشهر في التاريخ الأول">
                                <option value="default" selected disabled hidden>الشهر</option>
                            </select>
                            <input type="number" name="" class="years" id="years-1" placeholder="السنة" title="قم بإدخال السنة في التاريخ الأول" autocomplete="off" maxlength="4">
                        </div>
                    </div>
                    <div class="input-box" id="input-div2">
                        <label for="" id="date-lab2">التاريخ الثاني (بالميلادي)</label>
                        <div id="date-inputs2" class="date-inputs">

                            </select>
                            <select id="months2" name="" class="months" value="months" title="قم بتحديد الشهر في التاريخ الثاني">
                                <option value="default" selected disabled hidden>الشهر</option>
                            </select>
                            <input type="number" name="" class="years" id="years-2" placeholder="السنة" title="قم بإدخال السنة في التاريخ الثاني" autocomplete="off" maxlength="4">
                        </div>
                    </div>
                    <button type="submit" id="butt">حساب</button>
                </div>
            </div>
